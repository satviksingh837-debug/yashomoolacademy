<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Previous Paper Sets</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f0fdf4;
}

header{
background:#34a00a;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.main{
padding:15px;
}

.exam-card{
background:
linear-gradient(
135deg,
#dcfce7 0%,
#86efac 25%,
#22c55e 50%,
#15803d 75%,
#14532d 100%
);

padding:18px;
margin-bottom:18px;
border-radius:15px;
cursor:pointer;
color:white;

box-shadow:
0 0 25px rgba(34,197,94,0.5),
0 0 55px rgba(22,163,74,0.3);
}

.exam-title{
font-size:24px;
font-weight:bold;
}

.paper-area{
display:none;
margin-top:15px;
}

.paper{
background:white;
color:black;
padding:15px;
margin-top:12px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.paper:hover{
background:#dcfce7;
}

.paper-list{
display:none;
margin-top:10px;
}

.paper-list a{
display:block;
background:#f0fdf4;
padding:12px;
border-radius:8px;
margin-top:10px;
text-decoration:none;
color:#166534;
font-weight:bold;
}

iframe{
width:100%;
height:100vh;
border:none;
display:none;
}

.back-btn{
position:fixed;
top:15px;
right:15px;
padding:10px 18px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
display:none;
z-index:999;
}

</style>
</head>

<body>

<header>📄 Previous Paper Sets</header>

<button class="back-btn" onclick="closePDF()">❌ Close PDF</button>

<div class="main" id="mainContent">

<div class="exam-card" onclick="toggleExam('ssc')">
<div class="exam-title">SSC CGL</div>
<div class="paper-area" id="ssc">
<div class="paper" onclick="togglePaper(event,'cglpapers')">SSC CGL Papers</div>
<div class="paper-list" id="cglpapers">
<a href="papers/ssc-cgl/cgl-2024.pdf" target="paperFrame">
📄 SSC CGL 2024 PDF
</a>
<a href="papers/ssc-cgl/cgl-2023.pdf" target="paperFrame">
📄 SSC CGL 2023 PDF
</a>
</div>
</div>
</div>



<div class="exam-card" onclick="toggleExam('railway')">
<div class="exam-title">Railway</div>
<div class="paper-area" id="railway">
<div class="paper" onclick="togglePaper(event,'railpapers')">Railway Papers</div>
<div class="paper-list" id="railpapers">
<a href="papers/railway/railway-2024.pdf" target="paperFrame">
📄 Railway 2024 PDF
</a>
</div>
</div>
</div>


<div class="exam-card" onclick="toggleExam('ssc gd')">
<div class="exam-title">SSC GD</div>
<div class="paper-area" id="ssc gd">
<div class="paper" onclick="togglePaper(event,'gdpapers')">SSC GD Papers</div>
<div class="paper-list" id="gdpapers">
<a href="papers/ssc gd/ssc gd-2024.pdf" target="paperFrame">
📄 SSC GD 2024 PDF
</a>
</div>
</div>
</div>

</div>

<iframe name="paperFrame" id="paperFrame"></iframe>

<script>

function toggleExam(id){

event.stopPropagation();

let box=document.getElementById(id);

if(box.style.display==="block"){
box.style.display="none";
}else{
box.style.display="block";
}

}

function togglePaper(event,id){

event.stopPropagation();

let box=document.getElementById(id);

if(box.style.display==="block"){
box.style.display="none";
}else{
box.style.display="block";
}

}

document.querySelectorAll(".paper-list a").forEach(link=>{

link.addEventListener("click",function(){

document.getElementById("mainContent").style.display="none";

document.getElementById("paperFrame").style.display="block";

document.querySelector(".back-btn").style.display="block";

});

});

function closePDF(){

document.getElementById("paperFrame").style.display="none";

document.getElementById("mainContent").style.display="block";

document.querySelector(".back-btn").style.display="none";

}

</script>

</body>
</html>
