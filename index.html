*{margin:0;padding:0;box-sizing:border-box;}

body{

.container{

}

.folder-btn{

    color:white;
    cursor:pointer;
}

.topics-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:20px;
}

.topic-box{
    padding:15px;
    background:#f7a1a1;
    border-radius:10px;
    cursor:pointer;
}

/* TEST */
.test-container{display:none;}

.question-container{
    transition: all 0.3s ease;
    margin-bottom: 15px;
}

.question{
    background:#f1f1f1;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}

.option{
    background:white;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    cursor:pointer;
    border:2px solid #ddd;
    transition: all 0.3s ease;
}

.option:hover{
    background: #f0f8ff;
    border-color: #667eea;
}

/* 🔥 GREEN CORRECT ✅ */
.option.correct{
    background: linear-gradient(45deg, #4ade80, #22c55e) !important;
    color: white !important;
    border-color: #16a34a !important;
    animation: correctAnim 0.5s ease;
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
}

/* 🔥 RED WRONG ❌ */
.option.wrong{
    background: linear-gradient(45deg, #f87171, #ef4444) !important;
    color: white !important;
    border-color: #dc2626 !important;
    animation: wrongAnim 0.5s ease;
    box-shadow: 0 4px 12px rgba(248, 113, 113, 0.4);
}

/* 🔥 Animations */
@keyframes correctAnim {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

@keyframes wrongAnim {
    0% { transform: scale(1); }
    50% { transform: scale(0.95); }
    100% { transform: scale(1); }
}

.option.selected{
    background:#667eea;
    color:white;
    border-color: #5a67d8;
}

.nav-buttons{
    margin-top:15px;
    display:flex;

}

.btn{

}

.btn-primary{background:#667eea;color:white;}
.btn-danger{background:red;color:white;}

.result{
    display:none;
    background:#4facfe;
    color:white;
    padding:20px;
    border-radius:10px;
}

let questions=[];

let answers=[];
let skippedQuestions=0;
let currentSubject="";
let showAnswers=false;

/* SHOW TOPICS */
function showTopics(){
document.querySelector('.folder-btn').style.display='none';
document.getElementById('topicsContainer').style.display='block';

// 👇 ADD THIS
history.pushState({page:"topics"},"","#topics");
}

function loadSubject(subject){
currentSubject=subject;
document.getElementById('topicsContainer').style.display='none';

let chapters=Object.keys(allQuestions[subject]);
let html='<div class="topics-grid">';

chapters.forEach(ch=>{
html+=`<div class="topic-box" onclick="loadChapter('${ch}')">${ch}</div>`;
});

html+='</div>';

document.getElementById('chapterContainer').innerHTML=html;
document.getElementById('chapterContainer').style.display='block';

// 👇 ADD THIS
history.pushState({page:"chapters"},"","#chapters");
}

function loadChapter(ch){
questions=allQuestions[currentSubject][ch];
startTest();
}

/* START TEST */
function startTest(){
document.getElementById('chapterContainer').style.display='none';
document.getElementById('testContainer').style.display='block';

answers=new Array(questions.length).fill(null);
currentQuestionIndex=0;
skippedQuestions=0;
showAnswers=false;

// 👇 ADD THIS
history.pushState({page:"test"},"","#test");
showQuestion();
}

let q=questions[currentQuestionIndex];

document.getElementById('questionsContainer').innerHTML=`
<div class="question-container" id="questionContainer">
<div class="question">
<h3>Q${currentQuestionIndex+1}: ${q.question}</h3>
${q.options.map((opt,i)=>`<div class="option ${showAnswers ? (i===q.answer ? 'correct' : (answers[currentQuestionIndex]===i ? 'wrong' : '')) : (answers[currentQuestionIndex]===i ? 'selected' : '')}" onclick="${showAnswers ? '' : `selectOption(${i})`}">
${opt} ${showAnswers && i===q.answer ? '✅' : ''}
</div>`).join("")}
</div>
<p>सवाल ${currentQuestionIndex+1}/${questions.length}</p>
</div>
`;

document.getElementById('prevBtn').style.display = currentQuestionIndex>0?'block':'none';
document.getElementById('showAnswerBtn').style.display = showAnswers?'none':'block';
document.getElementById('finishBtn').style.display = currentQuestionIndex===questions.length-1?'block':'none';
}

function selectOption(i){
answers[currentQuestionIndex]=i;
showQuestion(); // Refresh to show selected
}

function showAnswer(){
showAnswers=true;
showQuestion();
}

function nextQuestion(){
if(answers[currentQuestionIndex]==null){
skippedQuestions++;
answers[currentQuestionIndex]=-1;
}

if(currentQuestionIndex<questions.length-1){
currentQuestionIndex++;
showAnswers=false;
showQuestion();
}else{
finishTest();
}
}

function previousQuestion(){
if(currentQuestionIndex>0){
currentQuestionIndex--;
showAnswers=false;
showQuestion();
}
}

function finishTest(){
    // 🔥 Skip count fix - सभी unfilled questions को count करो
    for(let i = 0; i < questions.length; i++) {
        if(answers[i] === null) {
            skippedQuestions++;
            answers[i] = -1; // Mark as skipped
        }
    }
    
    document.getElementById('testContainer').style.display='none';
    document.getElementById('resultContainer').style.display='block';

    let correct=0;
    answers.forEach((a,i)=>{
        if(a===questions[i].answer) correct++;
    });

    document.getElementById('finalScore').innerText=correct+"/"+questions.length;
    document.getElementById('skippedCount').innerText=skippedQuestions;
}

function restartTest(){
location.reload();
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/yashomoolacademy/service-worker.js')
      .then(reg => console.log("✅ SW Registered", reg))
      .catch(err => console.log("❌ SW Error", err));
  });
}
navigator.serviceWorker.register('/yashomoolacademy/service-worker.js', {
  scope: '/yashomoolacademy/'
});

window.onpopstate = function(event){

// सभी hide
document.querySelector('.folder-btn').style.display='none';
document.getElementById('topicsContainer').style.display='none';
document.getElementById('chapterContainer').style.display='none';
document.getElementById('testContainer').style.display='none';
document.getElementById('resultContainer').style.display='none';

// 👇 condition
if(!event.state){
document.querySelector('.folder-btn').style.display='block';
}
else if(event.state.page==="topics"){
document.getElementById('topicsContainer').style.display='block';
}
else if(event.state.page==="chapters"){
document.getElementById('chapterContainer').style.display='block';
}
else if(event.state.page==="test"){
document.getElementById('testContainer').style.display='block';
}
};
</script>
</body>
</html>
